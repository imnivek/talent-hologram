<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天賦數字圖</title>
<style>
  :root{--bg1:#fbf3e7;--bg2:#f3e6d0;--ink:#4f3a1f;--ink2:#6b5230;--sub:#a08a6a;
    --gold:#c79a4b;--goldd:#9c7327;--green:#8fb22f;--greend:#6f8f1f;
    --card:#fffdf8;--line:#ecdcbf;--hl:#d9663d;--l1:#d98c4a;--l2:#8fb22f;--l3:#c0a062;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Serif TC","Songti TC","PingFang TC","Microsoft JhengHei",serif;color:var(--ink);
    background:radial-gradient(circle at 50% 16%,var(--bg1),var(--bg2) 78%);min-height:100vh;line-height:1.7;-webkit-text-size-adjust:100%}
  .wrap{max-width:680px;margin:0 auto;padding:16px 14px 96px}
  header{text-align:center;padding:6px 0 2px}
  header h1{font-size:23px;letter-spacing:7px;color:var(--goldd);font-weight:800}
  header p{color:var(--sub);font-size:12px;margin-top:4px;letter-spacing:1px}
  .tabs{display:flex;gap:5px;background:#fff;border-radius:16px;padding:5px;margin:14px 0;box-shadow:0 6px 20px rgba(150,110,40,.12)}
  .tabs button{flex:1;border:0;background:transparent;padding:11px 3px;border-radius:12px;font-size:13px;color:var(--sub);cursor:pointer;font-weight:700;font-family:inherit;transition:.2s;white-space:nowrap}
  .tabs button.on{background:linear-gradient(135deg,var(--gold),var(--goldd));color:#fff;box-shadow:0 4px 12px rgba(160,120,40,.3)}
  .panel{background:var(--card);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 8px 28px rgba(150,110,40,.1)}
  label{display:block;font-size:12.5px;color:var(--sub);margin:0 0 6px;font-weight:600}
  input{width:100%;min-width:0;padding:11px 13px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;background:#fffdf8;color:var(--ink);font-family:inherit;transition:.15s}
  input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(199,154,75,.15)}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>div{flex:1 1 140px;min-width:0}
  /* 生日填寫欄 */
  .bday{display:flex;gap:8px}
  .bf{flex:1;min-width:0;text-align:center}
  .bf.by{flex:1.7}
  .bhint{font-size:11.5px;color:var(--sub);margin-top:6px}
  /* 流年區塊 */
  .fyr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .fbtn{flex:0 0 auto;border:1.5px solid var(--line);background:#fff;color:var(--goldd);width:40px;height:44px;border-radius:11px;font-size:21px;cursor:pointer;line-height:1}
  .fyr input{flex:1;min-width:74px;text-align:center}
  .fyl{color:var(--sub);font-size:13px}
  .fgo{flex:0 0 auto;border:0;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--goldd));color:#fff;padding:0 18px;height:44px;border-radius:12px;font-size:14px;font-weight:800;letter-spacing:2px}
  .fhero{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#fbf1dd,#f5e6cb);border-radius:14px;padding:13px 15px;margin:11px 0 4px;border:1px solid #ecd6a8}
  .fnum{flex:0 0 auto;width:58px;height:58px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#e7b86a,#c98a3c);color:#fff;font-size:29px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Arial;box-shadow:0 5px 13px rgba(160,120,40,.3)}
  .fa{font-size:16px;font-weight:800;color:var(--goldd)}
  .fa .wux{display:inline-block;font-size:11.5px;color:#8a6d2e;background:#fff;border:1px solid #e3c79a;border-radius:20px;padding:1px 9px;margin-left:7px;font-weight:700}
  .fe{font-size:13px;color:var(--ink2);margin-top:4px;line-height:1.6}
  .btn{width:100%;margin-top:14px;border:0;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--goldd));
    color:#fff;padding:13px;border-radius:13px;font-size:15px;font-weight:800;letter-spacing:3px;box-shadow:0 6px 16px rgba(160,120,40,.3);transition:.15s}
  .btn:active{transform:translateY(1px)}
  .btn.sec{background:#f3ead7;color:var(--goldd);box-shadow:none;letter-spacing:1px;margin-top:8px}
  .hint{font-size:12.5px;color:var(--sub);margin-top:8px;text-align:center}
  /* 主圖 */
  .chartwrap{display:flex;justify-content:center;background:radial-gradient(circle at 50% 40%,#fdf7ec,#f4e6cf);border-radius:22px;padding:6px;box-shadow:inset 0 2px 14px rgba(150,110,40,.08)}
  .chart{width:100%;max-width:660px}
  .tip{font-size:11.5px;color:var(--sub);text-align:center;margin:7px 0 0}
  /* 區塊卡片：明確區隔 */
  .block{background:var(--card);border-radius:18px;padding:15px 16px;margin:13px 0;box-shadow:0 5px 18px rgba(150,110,40,.08);border:1px solid #f1e7d3}
  .sect{font-size:16px;font-weight:800;color:var(--goldd);display:flex;align-items:baseline;gap:9px;margin-bottom:11px}
  .sect::before{content:"";width:5px;height:17px;background:linear-gradient(var(--gold),var(--goldd));border-radius:3px;flex:0 0 auto;align-self:center}
  .ssub{font-size:11.5px;font-weight:500;color:var(--sub);letter-spacing:0}
  /* 主性格 hero */
  .hero{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#eef6d8,#e0eebb);border-radius:16px;padding:15px 17px;border:1.5px solid #cfe08f}
  .hero .num{flex:0 0 auto;width:74px;height:74px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#b6d65a,#7fa028);color:#fff;font-size:38px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Arial;box-shadow:0 6px 16px rgba(120,150,40,.35)}
  .hero .ht{flex:1}
  .hero .ht .arch{font-size:20px;font-weight:800;color:var(--greend)}
  .hero .ht .wux{display:inline-block;font-size:12px;color:#5e7d18;background:#fff;border:1px solid #cfe08f;border-radius:20px;padding:1px 10px;margin-left:7px;font-weight:700}
  .hero .ht .ess{font-size:13px;color:var(--ink2);margin-top:5px;line-height:1.6}
  /* 特質列：主次分明 */
  .trait{display:flex;gap:10px;margin:10px 0;font-size:14px;line-height:1.65}
  .trait .tg{flex:0 0 auto;font-size:11.5px;font-weight:800;color:#fff;border-radius:8px;padding:3px 10px;height:fit-content;letter-spacing:1px;white-space:nowrap}
  .tg.pos{background:#7fa028}.tg.sh{background:#c98a3c}.tg.les{background:#a877c0}.tg.gold{background:var(--gold)}
  .tg.job{background:#5a7ea3}.tg.money{background:#bf911d}.tg.love{background:#c45b7c}.tg.body{background:#5a9a4e}
  .empty{text-align:center;color:var(--sub);font-size:13.5px;padding:30px 16px;line-height:1.8}
  .trait .tt{color:var(--ink)}
  /* 三我層 */
  .layer{border-radius:15px;padding:13px 14px;margin:10px 0;border-left:5px solid var(--l1);background:#faf4e8}
  .layer.l2{border-color:var(--l2);background:#f4f8e6}.layer.l3{border-color:var(--l3)}
  .layer .lh{display:flex;align-items:baseline;gap:9px;margin-bottom:3px}
  .layer .lh b{font-size:16px;color:var(--goldd);font-weight:800}
  .layer.l2 .lh b{color:var(--greend)}
  .layer .lh .lr{font-size:11.5px;color:var(--sub)}
  .layer .lm{font-size:12.5px;color:var(--ink2);margin-bottom:9px;line-height:1.6}
  /* 聯合密碼標籤 */
  .ctags{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0}
  .ctag{display:inline-flex;flex-direction:column;align-items:center;gap:2px;background:#fff;border:1.5px solid #dcc28d;border-radius:13px;padding:7px 14px;min-width:64px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
  .ctag:hover{box-shadow:0 4px 13px rgba(160,120,40,.2);transform:translateY(-1px)}
  .ctag:active{transform:scale(.96)}
  .ctag .ctn{font-size:11.5px;color:var(--goldd);font-weight:700;line-height:1.1}
  .ctag b{font-family:Arial;font-size:18px;color:var(--ink);letter-spacing:2px;line-height:1.15;font-weight:800}
  .ctag .cts{font-size:10px;color:var(--sub);line-height:1.1}
  .ctag.key{background:linear-gradient(135deg,#eef6d8,#dcecb4);border-color:var(--green)}
  .ctag.key .ctn{color:var(--greend)}.ctag.key b{color:var(--greend)}
  .ctag.sel{border-color:var(--hl);box-shadow:0 0 0 3px rgba(217,102,61,.2)}
  /* 通用文字 */
  .ana p{font-size:14px;margin:8px 0;line-height:1.7}
  .ev{display:inline-block;font-size:11px;color:#fff;background:var(--gold);border-radius:7px;padding:1px 9px;margin-right:6px;font-weight:700;letter-spacing:.5px}
  .gdesc{font-size:12.5px;color:var(--sub);margin:2px 0 8px;line-height:1.6}
  .mrow{font-size:13.5px;margin:8px 0;padding-bottom:8px;border-bottom:1px dashed var(--line);line-height:1.65}
  .mrow:last-child{border-bottom:0;padding-bottom:0}
  .mrow b{color:var(--goldd)}
  /* 角色標籤：主性格＋五行 */
  .badges{display:flex;flex-wrap:wrap;gap:10px}
  .sbadge{flex:1;min-width:140px;display:flex;align-items:center;gap:11px;background:#faf4e8;border:1px solid #ecdcbf;border-radius:15px;padding:11px 13px}
  .sbadge .sn{flex:0 0 auto;width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#b6d65a,#7fa028);color:#fff;font-size:25px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Arial;box-shadow:0 4px 11px rgba(120,150,40,.3)}
  .sbadge .si .nm{font-size:14px;font-weight:800;color:var(--ink)}
  .sbadge .si .ar{font-size:12.5px;color:var(--greend);font-weight:700}
  .sbadge .si .wx{font-size:11px;color:var(--sub);margin-top:1px}
  .sbadge .si .wx em{font-style:normal;color:#5e7d18;background:#fff;border:1px solid #cfe08f;border-radius:10px;padding:0 8px;font-weight:700;margin-left:2px}
  /* 分數 */
  .score{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#fbf1dd,#f6e8cd);border-radius:14px;padding:12px 15px;margin:8px 0 0}
  .score .sv{font-size:32px;font-weight:800;color:var(--goldd);font-family:Arial;line-height:1}
  .score .sl{font-size:12px;color:var(--ink2);line-height:1.55}
  /* 雷達 */
  .radarwrap{display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:center}
  .radar{width:262px;max-width:84vw}
  .pctlist{flex:1;min-width:185px}
  .pct{display:flex;align-items:center;gap:8px;font-size:13px;margin:5px 0}
  .pct .bar{flex:1;height:10px;background:#efe1c8;border-radius:6px;overflow:hidden}
  .pct .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--greend));border-radius:6px}
  .pct .n{width:90px;color:var(--ink)}.pct .p{width:62px;text-align:right;color:var(--goldd);font-weight:700;font-size:12px}
  /* 成員輸入 */
  .member{display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:#faf4e8;border:1px solid #efe1c8;border-radius:13px;padding:9px 10px;margin-bottom:8px}
  .member .mnm{flex:1 1 100%}
  .member .mb{flex:1;display:flex;gap:6px;min-width:0}
  .member .del{border:0;background:#f3ead7;color:var(--goldd);border-radius:10px;padding:0 13px;font-size:18px;cursor:pointer}
  .grp{background:#faf4e8;border-radius:13px;padding:11px 13px;margin:8px 0;font-size:13.5px;border:1px solid #ecdcbf}.grp b{color:var(--goldd)}
  .grp .gm{font-size:12px;color:var(--sub);margin-top:3px}
  .note{font-size:12px;color:var(--sub);background:#faf5ea;border-left:3px solid #d9b98a;padding:9px 12px;border-radius:9px;margin-top:14px;line-height:1.6}
  .foot{text-align:center;font-size:11.5px;color:var(--sub);margin-top:22px;line-height:1.7}
  /* 底部解讀面板 */
  #cdmask{position:fixed;inset:0;background:rgba(60,40,15,.28);opacity:0;pointer-events:none;transition:.25s;z-index:55}
  #cdmask.on{opacity:1;pointer-events:auto}
  #cdsheet{position:fixed;left:0;right:0;bottom:0;max-width:680px;margin:0 auto;background:var(--card);
    border-top:3px solid var(--hl);border-radius:22px 22px 0 0;box-shadow:0 -10px 36px rgba(120,70,30,.26);
    padding:16px 18px 28px;transform:translateY(135%);transition:transform .28s cubic-bezier(.2,.8,.25,1);z-index:60}
  #cdsheet.on{transform:translateY(0)}
  .cdhead{display:flex;align-items:center;gap:11px;margin-bottom:9px}
  .cdhead .cdn{font-family:Arial;font-size:26px;color:var(--hl);letter-spacing:4px;font-weight:800}
  .cdlab{font-size:12px;color:#fff;background:var(--hl);border-radius:20px;padding:2px 12px;font-weight:700}
  .cdx{margin-left:auto;border:0;background:#f3ead7;color:var(--goldd);width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;line-height:1}
  .cdmini{display:flex;justify-content:center;background:radial-gradient(circle at 50% 46%,#fdf7ec,#f4e6cf);border-radius:14px;padding:6px 4px 2px;margin:2px 0 4px}
  .minichart{width:100%;max-width:300px}
  .cdminitip{font-size:11px;color:var(--sub);text-align:center;margin:0 0 9px}
  .cdstruct{font-size:13.5px;color:var(--goldd);font-weight:700;margin-bottom:9px;background:#faf4e8;border-radius:10px;padding:8px 12px}
  .cdbody{font-size:15px;color:var(--ink);line-height:1.8}
  .cdwux{font-size:11.5px;color:var(--sub);margin-top:11px;border-top:1px dashed var(--line);padding-top:8px;line-height:1.6}
  /* 生日隱藏開關 */
  .bdtoggle{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:0 0 4px}
  .bdtoggle .bt-tx{font-size:13px;font-weight:700;color:var(--goldd)}
  .switch{position:relative;display:inline-block;width:44px;height:25px;flex:0 0 auto}
  .switch input{position:absolute;opacity:0;width:0;height:0;margin:0;padding:0}
  .switch .sl{position:absolute;inset:0;background:#e3d2ab;border-radius:25px;cursor:pointer;transition:.2s}
  .switch .sl::before{content:"";position:absolute;width:19px;height:19px;left:3px;top:3px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(120,80,20,.3);transition:.2s}
  .switch input:checked + .sl{background:linear-gradient(135deg,var(--gold),var(--goldd))}
  .switch input:checked + .sl::before{transform:translateX(19px)}
  /* 號碼查詢分頁 */
  .gnav{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 4px}
  .gchip{flex:1 1 60px;min-width:60px;border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:7px 3px;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--goldd);font-weight:800;font-size:18px;transition:.15s}
  .gchip small{font-size:10px;color:var(--sub);font-weight:600}
  .gchip:hover{border-color:var(--gold);box-shadow:0 3px 10px rgba(160,120,40,.15);transform:translateY(-1px)}
  .gcard{background:var(--card);border:1px solid #f1e7d3;border-radius:16px;margin:9px 0;box-shadow:0 4px 14px rgba(150,110,40,.07);overflow:hidden;scroll-margin-top:12px;transition:box-shadow .25s}
  .gcard.flash{box-shadow:0 0 0 3px rgba(217,102,61,.32)}
  .ghd{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
  .ghd .gnum{flex:0 0 auto;width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#e7b86a,#c98a3c);color:#fff;font-size:24px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Arial;box-shadow:0 4px 11px rgba(160,120,40,.28)}
  .gti{flex:1;min-width:0}
  .gnm{font-size:16px;font-weight:800;color:var(--ink)}
  .garch{font-size:12px;font-weight:700;color:var(--goldd);margin-left:8px}
  .gwx{font-size:11.5px;color:var(--sub);margin-top:1px}
  .gwx em{font-style:normal;color:#8a6d2e;background:#fff;border:1px solid #e3c79a;border-radius:10px;padding:0 8px;font-weight:700;margin-left:2px}
  .gess{font-size:12.5px;color:var(--ink2);margin-top:3px;line-height:1.5}
  .gtog{flex:0 0 auto;color:var(--gold);font-size:14px;width:22px;text-align:center}
  .gtog::after{content:"\25B8"}
  .gcard.open .gtog::after{content:"\25BE"}
  .gbd{display:none;padding:3px 15px 15px;border-top:1px dashed var(--line)}
  .gcard.open .gbd{display:block}
  .gintro{font-size:13.5px;color:var(--ink2);line-height:1.7;margin:11px 0 4px}
  /* 需要尋找的合作夥伴（五行天然助力） */
  .pcards{display:flex;flex-wrap:wrap;gap:9px}
  .pcard{flex:1 1 150px;min-width:150px;display:flex;align-items:center;gap:10px;background:#f5f8fb;border:1px solid #d6e3ef;border-radius:13px;padding:10px 12px}
  .pcard .pn{flex:0 0 auto;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#7fa9d6,#5a7ea3);color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Arial}
  .pcard .pi{min-width:0}
  .pcard .pnm{font-size:13.5px;font-weight:800;color:#3f6286}
  .pcard .pwx{font-size:10.5px;color:#5e7d18;background:#fff;border:1px solid #cfe08f;border-radius:10px;padding:0 7px;font-weight:700;margin-left:6px;white-space:nowrap}
  .pcard .pds{font-size:11.5px;color:#6b7d90;line-height:1.45;margin-top:2px}
  /* 角色小天賦圖（可點擊放大） */
  .minihCwrap{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .minihC{flex:1 1 150px;max-width:210px;cursor:zoom-in;background:radial-gradient(circle at 50% 40%,#fdf7ec,#f4e6cf);border-radius:14px;padding:5px 5px 2px;box-shadow:inset 0 2px 10px rgba(150,110,40,.08);transition:box-shadow .15s,transform .15s}
  .minihC:hover{box-shadow:0 5px 16px rgba(160,120,40,.25);transform:translateY(-2px)}
  .minihC .chart{width:100%;display:block}
  .minihC-cap{text-align:center;font-size:12px;color:var(--goldd);font-weight:800;margin:1px 0 4px;letter-spacing:1px}
  .minihC-cap small{display:block;font-size:10px;color:var(--sub);font-weight:600;letter-spacing:0}
  /* 放大天賦圖彈窗 */
  #zmask{position:fixed;inset:0;background:rgba(60,40,15,.4);opacity:0;pointer-events:none;transition:.25s;z-index:65}
  #zmask.on{opacity:1;pointer-events:auto}
  #zsheet{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);opacity:0;pointer-events:none;width:min(94vw,560px);max-height:92vh;overflow:auto;background:var(--card);border-radius:20px;border-top:3px solid var(--hl);box-shadow:0 16px 50px rgba(120,70,30,.4);padding:14px 16px 18px;z-index:70;transition:transform .25s cubic-bezier(.2,.8,.25,1),opacity .25s}
  #zsheet.on{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto}
  .zhead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .zhead #zttl{font-size:15px;font-weight:800;color:var(--goldd)}
  /* 關鍵碼：主性格／動機碼／外心密碼 */
  .kcs{display:flex;flex-direction:column;gap:8px;margin:2px 0 4px}
  .kc{display:flex;align-items:center;gap:11px;background:#faf4e8;border:1px solid #ecdcbf;border-radius:13px;padding:9px 12px}
  .kc .kcn{flex:0 0 auto;width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#e7b86a,#c98a3c);color:#fff;font-size:21px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Arial}
  .kc .kci{flex:1;min-width:0}
  .kc .kcl{font-size:13px;font-weight:800;color:var(--goldd)}
  .kc .kcp{font-size:10.5px;color:#fff;background:var(--green);border-radius:10px;padding:0 8px;margin-left:7px;font-weight:700}
  .kc .kca{font-size:12.5px;color:var(--ink);font-weight:700;margin-top:1px}
  .kc .kca em{font-style:normal;color:#5e7d18;background:#fff;border:1px solid #cfe08f;border-radius:10px;padding:0 7px;font-weight:700;margin-left:6px}

<div class="wrap">
  <header><h1>天 賦 數 字 圖</h1><p>用生日畫出天賦結構 · 看懂彼此的合作化學</p></header>
  <div class="tabs">
    <button class="on" data-t="solo">個人天賦圖</button>
    <button data-t="pair">兩人配對</button>
    <button data-t="team">團隊合作</button>
    <button data-t="guide">號碼查詢</button>
  </div>

  <section id="solo">
    <div class="panel">
      <div><label>暱稱（選填）</label><input id="s_nm" placeholder="例如：小宇"></div>
      <div style="margin-top:11px"><label>西元生日（直接輸入）</label>

          <input id="s_y" class="bf by" type="number" inputmode="numeric" placeholder="西元年 如2000" min="1900" max="2026">
          <input id="s_m" class="bf" type="number" inputmode="numeric" placeholder="月" min="1" max="12">
          <input id="s_d" class="bf" type="number" inputmode="numeric" placeholder="日" min="1" max="31">
        </div>
        <div class="bhint">直接點欄位輸入數字，例如 2000、1、1（灰字僅為範例提示）</div>
      </div>
      <button class="btn" onclick="runSolo()">繪製天賦圖</button>
    </div>
    <div class="panel" id="s_out"></div>
  </section>

  <section id="pair" style="display:none">
    <div class="panel">
      <div><label>A 暱稱</label><input id="p_n1" placeholder="夥伴A"></div>
      <div style="margin-top:10px"><label>A 西元生日</label>
        <div class="bday">
          <input id="p1_y" class="bf by" type="number" inputmode="numeric" placeholder="西元年 如2000" min="1900" max="2026">
          <input id="p1_m" class="bf" type="number" inputmode="numeric" placeholder="月" min="1" max="12">
          <input id="p1_d" class="bf" type="number" inputmode="numeric" placeholder="日" min="1" max="31">

      <div style="margin-top:12px"><label>B 暱稱</label><input id="p_n2" placeholder="夥伴B"></div>
      <div style="margin-top:10px"><label>B 西元生日</label>
        <div class="bday">
          <input id="p2_y" class="bf by" type="number" inputmode="numeric" placeholder="西元年 如2000" min="1900" max="2026">
          <input id="p2_m" class="bf" type="number" inputmode="numeric" placeholder="月" min="1" max="12">
          <input id="p2_d" class="bf" type="number" inputmode="numeric" placeholder="日" min="1" max="31">
        </div></div>
      <button class="btn" onclick="runPair()">看合作化學反應</button>
    </div>
    <div class="panel" id="p_out"></div>
  </section>

  <section id="team" style="display:none">
    <div class="panel">
      <label>團隊成員（3 至 12 人）</label><div id="t_mem"></div>
      <button class="btn sec" onclick="addMem()">＋ 新增成員</button>
      <button class="btn" onclick="runTeam()">分析團隊與分組</button>
    </div>
    <div class="panel" id="t_out"></div>
  </section>

  <section id="guide" style="display:none">
    <div class="panel" id="g_out"></div>
  </section>

/* 主性格深度特質（原創整理） */
/* 數字對應五行（經《五行對應》《五行對應數字能量計算》兩份求證一致）：金1·6、水2·7、木4·9、火3·8、土5。
   WUXNAME 順序即相生循環 木→火→土→金→水→木，wuxRel 依此判定相生相剋。WUX 為唯一準據。 */
const WUXNAME=["木","火","土","金","水"];
const WUX={1:3,2:4,3:1,4:0,5:2,6:3,7:4,8:1,9:0};

function radarSVG(spec,total){
  const size=270,cx=135,cy=135,R=92,N=9,max=Math.max(1,...Object.values(spec));
  const pt=(i,r)=>{const ang=-Math.PI/2+i*2*Math.PI/N;return[cx+r*Math.cos(ang),cy+r*Math.sin(ang)];};
  let g="";[0.34,0.67,1].forEach(f=>{const p=[];for(let i=0;i<N;i++)p.push(pt(i,R*f).join(","));g+=`<polygon points="${p.join(" ")}" fill="none" stroke="#e7d6b6" stroke-width="1"/>`;});
  let ax="",lb="";for(let i=0;i<N;i++){const[x,y]=pt(i,R);ax+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#efe1c8" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+16);const c=spec[i+1],pct=Math.round(c/total*100);
    lb+=`<text x="${lx}" y="${ly+4}" text-anchor="middle" font-size="11" fill="#9c7327" font-weight="${c?700:400}">${i+1}${c?(' '+c+'人'):''}</text>`;}
  const poly=[];for(let i=0;i<N;i++)poly.push(pt(i,R*Math.max(0.04,spec[i+1]/max)).join(","));
  return `<svg class="radar" viewBox="0 0 ${size} ${size}">${g}${ax}<polygon points="${poly.join(" ")}" fill="rgba(156,191,63,.28)" stroke="#8fb22f" stroke-width="2"/>${lb}</svg>`;
}

  const teamCombo=ms.map(m=>m.t.O).join("·");
  const topO=present.slice().sort((x,y)=>spec[y]-spec[x])[0];
  const coopTxt=`<p><span class="hl-tip">已具備</span> ${haveTxt}。</p><p style="margin-top:6px"><span class="hl-good">整體適合</span> ${present.includes(1)||present.includes(8)?'有人帶頭、':''}${present.includes(4)?'把事落地、':''}${present.includes(3)||present.includes(5)?'對外開拓、':''}${present.includes(2)||present.includes(6)?'凝聚彼此、':''}${present.includes(7)||present.includes(9)?'看清方向':'分工推進'}的合作模式。</p>`;
  /* 角色覆蓋：以主性格坐鎮三碼 M·N·O 一起看，分強項／潛在／缺口（這三個數字都重要） */
  const mainSet=new Set(ms.map(m=>m.t.O));
  const compSet=new Set();ms.forEach(m=>[m.t.M,m.t.N,m.t.O].forEach(x=>compSet.add(x)));
  const latent=[...compSet].filter(x=>!mainSet.has(x)).sort((a,b)=>a-b);
  const gap2=[];for(let i=1;i<=9;i++)if(!compSet.has(i))gap2.push(i);
  const latentTxt=latent.length?latent.map(n=>n+" "+NUM[n].a).join("、"):"無，強項已涵蓋坐鎮三碼。";
  const gapTxt2=gap2.length?gap2.map(n=>"・"+NUM[n].gap).join("<br>"):"以主性格坐鎮三碼來看，九種角色能量都有人帶到，沒有明顯缺口。";
  /* 動機碼（I）分佈：團隊的共同出發點，+10% */
  const motiveSpec={};for(let i=1;i<=9;i++)motiveSpec[i]=0;ms.forEach(m=>motiveSpec[m.t.I]++);
  const motivePresent=Object.keys(motiveSpec).filter(k=>motiveSpec[k]>0).map(Number).sort((a,b)=>motiveSpec[b]-motiveSpec[a]);
  const motiveTxt=motivePresent.map(n=>NUM[n].a+"（"+motiveSpec[n]+"人）").join("、");const topI=motivePresent[0];
  /* 外心密碼（U+R+X）兩兩互動磨合，+10% */
  let pSheng=0,pBihe=0,pKe=0,pPrs=0,pSum=0;
  for(let i=0;i<ms.length;i++)for(let j=i+1;j<ms.length;j++){pPrs++;const rt=wuxRel(ms[i].t.ext,ms[j].t.ext).t;pSum+=wuxScore(rt);if(rt==="相生")pSheng++;else if(rt==="比和")pBihe++;else pKe++;}
  const harmony=pPrs?Math.round(pSum/pPrs):0;
  document.getElementById("t_out").innerHTML=`
    ${block("團隊主性格雷達",`<div class="radarwrap">${radarSVG(spec,tot)}<div class="pctlist">${pctRows}</div></div>`,tot+" 人")}
    ${block("成員主性格（含五行）",badges)}
    ${block("成員天賦圖",`<div class="minihCwrap">${ms.map(m=>personChart(m.t,m.nm)).join("")}</div>`,"點任一張放大看完整天賦圖")}
    ${block("主性格聯合密碼",mnoTags+`<p class="gdesc">點任一成員標籤看該組完整解讀。團隊主性格組合 ${teamCombo}，以 ${topO} ${NUM[topO].a} 為主（${spec[topO]} 人），整體適合發揮這項優勢，並留意盲點補足。</p>`+memberReads,"每位成員 ＋ 全隊")}
    ${block("團隊真正有的角色（主性格＋坐鎮三碼）",
      `<div class="rolerow"><span class="rt have">強項</span>${haveTxt}</div>
       <div class="rolerow"><span class="rt latent">潛在</span>有人在動機／能量碼帶有：${latentTxt}。雖非主性格，但可培養或在缺人時輪值補位。</div>
       <div class="ana" style="margin-top:8px">${coopTxt}</div>`,"主性格與相關數字一起看")}
    ${block("團隊缺口（建議補強）",`<div class="rolerow"><span class="rt gap">缺口</span>以坐鎮三碼來看，整個團隊都沒有人帶到的角色：</div><div class="ana"><p>${gapTxt2}</p></div>`)}
    ${block("團隊動機與互動磨合",
      `<div class="mrow"><b>共同動機</b>分佈：${motiveTxt}，以 <span class="hl-good">${NUM[topI].a}</span> 為主要出發點。動機相近的人出發點合拍；落差大時，先一起對齊「為什麼而做」再分工。</div>
       ${scoreMeter(harmony,"互動順暢度","依成員之間的對外互動風格估算，越高代表相處越省力。",["很順暢","還算順","偶有摩擦","磨合較多"])}
       <div class="statrow"><span class="st sheng">${pSheng} 對相生</span><span class="st bihe">${pBihe} 對比和</span><span class="st ke">${pKe} 對需磨合</span></div>
       <p class="gdesc" style="margin-top:6px">${pKe>pSheng?'磨合對數偏多，建議明訂溝通規則與分工界線，把摩擦轉成砥礪。':'互動大致順暢，維持現有默契並保留磨合空間即可。'}</p>`,"動機與互動兩個面向")}
    ${block("互補分組建議",grpHtml)}
    <div class="note">分析綜合主性格、相關數字、動機與對外互動等面向。雷達圖為主性格分佈；分組讓各組主性格盡量多元，可直接用於團建。非命定預測。</div>`;
}

/* 生日隱藏開關：切換後重繪個人天賦圖（含流年圖） */
function toggleBday(el){window.__HIDEBDAY=el.checked;runSolo();}

/* 需要尋找的合作夥伴：五行相生為天然助力（含五行標籤） */
function partnersFor(O){const list=[];
  for(let p=1;p<=9;p++){if(p===O)continue;const rel=wuxRel(O,p);
    if(rel.t==="相生"){const pr=PAIRS[pk(O,p)]||["","","","互相補位"];
      list.push({n:p,arch:NUM[p].a,role:NUM[p].collab,way:pr[3],tone:pr[0],wux:WUXNAME[WUX[p]]});}}
  return list;}

/* ===== 合作精準模型：主性格 60% ＋ 動機碼(I) 10% ＋ 外心密碼(U+R+X) 10% ＝ 約 80% ===== */
const wuxOf=n=>WUXNAME[WUX[n]];
/* 五行關係轉分數：相生順、比和合、相剋需磨合 */
function wuxScore(relT){return relT==="相生"?92:relT==="比和"?78:62;}
/* 五行關係對應顏色類別（標籤用） */
const relClass=rt=>rt==="相生"?"sheng":rt==="比和"?"bihe":"ke";
/* 分數等級：依分數回傳顏色與等級索引（0 高 → 3 低） */
function scoreLevel(s){if(s>=82)return{i:0,c:"#6f8f1f",bg:"#7fa028"};if(s>=70)return{i:1,c:"#9c7327",bg:"#c79a4b"};if(s>=58)return{i:2,c:"#b9772e",bg:"#d98c4a"};return{i:3,c:"#bf5b5b",bg:"#c45b7c"};}
/* 分數圓環儀表：大數字 X/100 ＋ 等級評語，重點一眼看見 */
function scoreMeter(score,label,sub,verdicts){
  verdicts=verdicts||["很契合","還不錯","需要磨合","差異較大"];
  const L=scoreLevel(score),C=226.19,off=(C*(1-Math.max(0,Math.min(100,score))/100)).toFixed(1);
  return `<div class="scoremeter"><div class="ring"><svg viewBox="0 0 82 82" width="82" height="82"><circle cx="41" cy="41" r="36" fill="none" stroke="#ecdcbf" stroke-width="9"/><circle cx="41" cy="41" r="36" fill="none" stroke="${L.bg}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 41 41)"/></svg><div class="rv"><b style="color:${L.c}">${score}</b><small>/ 100</small></div></div><div class="sm-r"><span class="verdict" style="background:${L.bg}">${label}：${verdicts[L.i]}</span><div class="sl">${sub}</div></div></div>`;
}
/* 個人關鍵碼卡：主性格 O（坐鎮三碼 M·N·O）、動機碼 I、外心密碼 ext */
function keyCodesHTML(t){
  const chip=(lab,n,desc)=>`<div class="kc"><div class="kcn">${n}</div><div class="kci"><div class="kcl">${lab}</div><div class="kca">${NUM[n].a}<em>五行${wuxOf(n)}</em></div><div class="kcd">${desc}</div></div></div>`;
  return `<div class="kcs">
    ${chip("主性格碼",t.O,"你個性的主軸，看大方向的角色")}
    ${chip("動機碼",t.I,"做事的起心動念與出發點，看是否同調")}
    ${chip("外心碼",t.ext,"對外互動與磨合風格，看合作順不順")}
  </div>
  <p class="gdesc">主性格由你的動機（${t.M} ${NUM[t.M].a}）與能量（${t.N} ${NUM[t.N].a}）一起合成，這幾個數字都是看天賦與分工的關鍵。</p>`;
}
/* 兩人三維度合作評估：主性格／動機碼／外心密碼，各以五行相生相剋判定 */
function pairModel(a,b){
  const main=wuxRel(a.O,b.O),motive=wuxRel(a.I,b.I),outer=wuxRel(a.ext,b.ext);
  const score=Math.round(wuxScore(main.t)*0.75+wuxScore(motive.t)*0.125+wuxScore(outer.t)*0.125);
  return {main,motive,outer,score};
}

/* 角色小天賦圖（可點擊放大）。pair/team 以 false,false 呼叫：不覆寫主圖節點、不受生日隱藏開關影響 */
function personChart(t,name){const ci=(window.__CHARTS=window.__CHARTS||[]).push({t,name})-1;
  return `<div class="minihC" data-ci="${ci}" onclick="zoomChart(this)" title="點擊放大看完整天賦圖">${chartSVG(t,false,false)}<div class="minihC-cap">${name}<small>點擊放大</small></div></div>`;}
function zoomChart(el){const o=(window.__CHARTS||[])[+el.dataset.ci];if(!o)return;
  document.getElementById("zttl").textContent=(o.name?o.name+" 的 ":"")+"天賦圖";
  document.getElementById("zbody").innerHTML=chartSVG(o.t,false,false);
  document.getElementById("zmask").classList.add("on");document.getElementById("zsheet").classList.add("on");}
function hideZoom(){document.getElementById("zmask").classList.remove("on");document.getElementById("zsheet").classList.remove("on");}

/* 個人生日填好後，預填到配對 A 方與團隊第一位成員（僅在對方欄位為空時填入，不覆寫已輸入內容） */
function prefillSelf(){
  const y=document.getElementById("s_y").value,m=document.getElementById("s_m").value,d=document.getElementById("s_d").value;
  if(!y||!m||!d)return;
  const nm=document.getElementById("s_nm").value.trim();
  const setIf=(id,v)=>{const el=document.getElementById(id);if(el&&!el.value)el.value=v;};
  setIf("p1_y",y);setIf("p1_m",m);setIf("p1_d",d);if(nm)setIf("p_n1",nm);
  const fm=document.querySelector("#t_mem .member");
  if(fm){const q=(c,v)=>{const el=fm.querySelector(c);if(el&&!el.value)el.value=v;};
    q(".mby",y);q(".mbm",m);q(".mbd",d);if(nm)q(".mnm",nm);}
}

/* ===== 號碼查詢（1-9 號特質對照） ===== */
/* 簡明特質與課題（取自《1-9 號特質分析》整理，給第一次使用的人快速對照） */
const INTRO={
 1:{name:"開創數",desc:"天生具備獨立、領導與創新能力。1 號人像領頭羊，勇於面對挑戰，適合擔任主管或創業者。",task:"需避免過於自我中心或強勢，學習與他人協調與合作。"},
 2:{name:"協調數",desc:"擁有極高的同理心與細膩的感知力。2 號人善於聆聽、配合度高，是優秀的協調者與藝術愛好者。",task:"容易受他人情緒影響或缺乏主見，需學會獨立思考及勇敢表達真實想法。"},
 3:{name:"創意數",desc:"充滿熱情、樂觀幽默，且擅長表達與社交。3 號人創意豐富，通常是團體中的開心果，適合公關或行銷領域。",task:"興趣廣泛但容易虎頭蛇尾，需培養耐心與責任感，才能將創意轉化為長期的專長。"},
 4:{name:"務實數",desc:"腳踏實地、條理分明，對管控風險與細節極為在行。4 號人重視規律與安全感，是團隊中最可靠的執行者。",task:"容易缺乏彈性與安全感，需試著放下對完美的執著，接受生活中不可預測的變化。"},
 5:{name:"自由數",desc:"崇尚自由、熱愛冒險，適應力與說服力極強。5 號人討厭枯燥，腦筋動得快，適合需要變動與創新的工作。",task:"容易顯得衝動、善變或害怕承諾，需學習在自由中建立紀律與專注力。"},
 6:{name:"智慧奉獻數",desc:"具備強烈的責任感與包容力，天生懂得照顧人。6 號人重視家庭與關係，富有治癒他人的溫暖特質。",task:"容易因過度付出而產生得失心，需學會適時放手，避免給伴侶或家人過大壓力。"},
 7:{name:"探究數",desc:"邏輯清晰、分析能力強，對事物充滿好奇心與追求真理的精神。7 號人適合擔任策略規劃或需要深度研究的工作。",task:"有時會顯得不夠圓融或過度鑽牛角尖，需學會將專注力轉移，並敞開心胸與他人分享情感。"},
 8:{name:"權勢數",desc:"具備敏銳的商業頭腦、野心與執行力。8 號人在職場上通常能展現領袖魅力，追求物質與成就的實現。",task:"容易過度追求金錢與權力而忽略人情味，需學習同理他人並給予伴侶適當的空間。"},
 9:{name:"博愛數",desc:"具備無私奉獻、靈性與大愛特質。9 號人是理想主義者，樂於幫助弱小，適合從事啟發人心或公益相關行業。",task:"理想與現實容易產生拉扯，幫助他人時需尊重對方的選擇，避免過度干涉而引起反彈。"}};
function gotoTab(t){const b=[...document.querySelectorAll(".tabs button")].find(x=>x.dataset.t===t);if(b)b.click();window.scrollTo({top:0,behavior:"smooth"});}
function toggleGuide(n){document.getElementById("gc-"+n).classList.toggle("open");}
function jumpGuide(n){const c=document.getElementById("gc-"+n);if(!c)return;c.classList.add("open");c.scrollIntoView({behavior:"smooth",block:"start"});c.classList.add("flash");setTimeout(()=>c.classList.remove("flash"),1200);}
function guideCard(n){const I=INTRO[n],D=NUM[n],L=LORE[n];
  return `<div class="gcard${n===1?' open':''}" id="gc-${n}">
    <div class="ghd" onclick="toggleGuide(${n})">
      <div class="gnum">${n}</div>
      <div class="gti">
        <div class="gnm">${I.name}<span class="garch">${D.a}·${D.r}</span></div>
        <div class="gwx">五行<em>${WUXNAME[L.w]}</em></div>
        <div class="gess">${D.ess}</div>
      </div>
      <div class="gtog"></div>
    </div>
    <div class="gbd">
      <p class="gintro">${I.desc}</p>
      <div class="trait"><span class="tg pos">正面天賦</span><span class="tt">${L.pos}</span></div>
      <div class="trait"><span class="tg sh">負面陰影</span><span class="tt">${L.shadow}</span></div>
      <div class="trait"><span class="tg les">人生功課</span><span class="tt">${L.lesson}</span></div>
      <div class="trait"><span class="tg les">課題提醒</span><span class="tt">${I.task}</span></div>
      <div class="trait"><span class="tg gold">日常展現</span><span class="tt">${D.shine}</span></div>
      <div class="trait"><span class="tg job">合作角色</span><span class="tt">${D.collab}</span></div>
      <div class="trait"><span class="tg gold">小提醒</span><span class="tt">${D.advice}</span></div>
    </div>
  </div>`;}
function renderGuide(){
  const nav=`<div class="gnav">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="gchip" onclick="jumpGuide(${n})">${n}<small>${INTRO[n].name}</small></button>`).join("")}</div>`;
  const cards=[1,2,3,4,5,6,7,8,9].map(guideCard).join("");
  document.getElementById("g_out").innerHTML=`
    ${block("先讀我",`<p class="gintro" style="margin-top:4px">每個人的生日都藏著 1 到 9 九種天賦能量。生日數字一層層算下來，最頂端那個就是你的「主性格」，最能代表你的個性。下面整理了 1 到 9 每個數字的個性、天賦、陰影與人生功課，先認識自己，也能看懂家人與夥伴。</p>
      <p class="gdesc">還不知道自己是幾號？切到「個人天賦圖」輸入生日就會算出來，再回來這裡對照。</p>
      <button class="btn sec" onclick="gotoTab('solo')">去算我的主性格 ›</button>`,"第一次使用看這裡")}
    ${block("快速跳到號碼",nav+`<p class="gdesc" style="margin:6px 0 0">點數字直接跳到該號說明，點每張卡片可展開或收合。</p>`)}
    ${cards}
    <div class="note">本頁特質與人生功課為本工具原創整理，為自我探索與人際理解用途，非命定預測。</div>`;
}

document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("on"));b.classList.add("on");["solo","pair","team","guide"].forEach(t=>document.getElementById(t).style.display=t===b.dataset.t?"block":"none");if(b.dataset.t==="pair"||b.dataset.t==="team")prefillSelf();});
renderGuide();
runSolo();
addMem();addMem();addMem();
